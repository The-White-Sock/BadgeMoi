name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1" # tous les lundis, indépendamment des changements de code

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configurer le JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          # Cache désactivé : un build entièrement servi par le cache n'invoque pas
          # le compilateur Kotlin, et CodeQL ne peut alors rien tracer/analyser.
          cache-disabled: true

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Compilation debug (sans cache, pour que CodeQL trace la compilation)
        run: ./gradlew clean assembleDebug --no-build-cache

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@e4c79b4e9ebfe577d446333c2e31ed81079e7b03 # v4
