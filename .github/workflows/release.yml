name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Deploy key en bypass du ruleset sur main (le GITHUB_TOKEN par défaut
          # n'est pas éligible au bypass) — voir docs/publication.md.
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configurer le JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configurer Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Installer les dépendances de release
        run: npm ci

      - name: Identité git pour les commits de release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
